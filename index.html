<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philips Productivity Tracker</title>
</head>
<body>
    <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
            <li><a href="#callback-form">Supervisor Callback</a></li>
        </ul>
    </nav>
    <div id="home">
        <h1>Welcome to Philips Productivity Tracker</h1>
        <div class="form-card">
            <h2>Supervisor Callback Form</h2>
            <form id="callback-form">
                <label for="consumerContact">Consumer Contact:</label>
                <input type="text" id="consumerContact" name="consumerContact" required><br>
                <label for="referenceCase">Reference Case:</label>
                <input type="text" id="referenceCase" name="referenceCase" required><br>
                <label for="callBackReason">Call Back Reason:</label>
                <input type="text" id="callBackReason" name="callBackReason" required><br>
                <label for="callBackTime">Call Back Time:</label>
                <select id="callBackTime" name="callBackTime">
                    <option value="24 Hours">24 Hours</option>
                    <option value="Same Day">Same Day</option>
                    <option value="Urgent Call-Back Required">Urgent Call-Back Required</option>
                </select><br>
                <label for="consumerPreferredTime">Consumer Preferred Time:</label>
                <input type="time" id="consumerPreferredTime" name="consumerPreferredTime" required><br>
                <button type="submit">Submit</button>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('callback-form').onsubmit = function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            fetch('https://script.google.com/macros/s/AKfycbyWsISnlU3TzYKgxOSoB8gpVznTlbSHYJLNYTbXWcI_DfJ63jjlGegTjfli_NbxoKyaoQ/exec', {
                method: 'POST',
                body: formData,
            })
            .then(response => response.text())
            .then(data => {
                alert('Form submitted successfully!');
                console.log(data);
            })
            .catch(error => {
                alert('Error submitting form.');
                console.error(error);
            });
        };
    </script>
</body>
</html>
